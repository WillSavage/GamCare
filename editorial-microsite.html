    // its OWN frames — from local text at the root, or text obtained from

    // navigation stays same-origin with its initiator and a deduped page

    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends

    // opaque contexts — file:// — everything serializes as 'null', where

    // its (possibly foreign) parent.

    const blobUrls = {};
    const resourceBlobs = {};

      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;

      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;

        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }

        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'

        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.

    setStatus('Unpacking ' + uuids.length + ' assets...');

    // consumers read these Blobs directly. Survives the swap like the error sink.

      ';</' + 'script>';

    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).

    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.

      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });

      }

        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();

      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 24px; left: 24px; background: rgba(107,10,159,0.92); clip-path: url(#gc-droplet); display: flex; align-items: flex-start; justify-content: flex-start; top: 40px; z-index: 1;\">\n      \n    <div style=\"padding: 6% 20% 30% 8%; max-width: 68%; text-align: left; width: 227px; height: 189px; position: relative; left: 50px; top: 50px\">\n        <div style=\"display: inline-flex; align-items: center; gap: 8px; background: rgba(41,26,92,0.5); border: 1px solid rgba(215,175,235,0.5); color: #FFF8EF; font-size: 12.5px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; padding: 6px 13px; border-radius: 100px; margin-bottom: 18px; white-space: nowrap; position: static\">\n          <span style=\"width: 9px; height: 9px; background: #D7AFEB; clip-path: url(#gc-droplet); flex-shrink: 0;\"><\u002Fspan>\n          Quarterly Briefing · Issue 04\n        <\u002Fdiv>\n        \n        <h1 style=\"font-size: 80px; line-height: 1.03; letter-spacing: -0.02em; font-weight: 800; color: #FFF8EF; margin: 0 0 16px; width: 324px; height: 169px\">Closing<br>the gap<\u002Fh1><p style=\"font-size: 17px; line-height: 1.5; color: #FFF8EF; margin: 0; opacity: 0.9; position: relative\">Why earlier support changes outcomes — and what policymakers can do to bring it forward.<\u002Fp>\n      <\u002Fdiv><\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"max-width: 1400px; margin: 0 auto; padding: 72px 32px 0;\">\n\n    <div id=\"ctx\" style=\"scroll-margin-top: 140px;\">\n      <div style=\"position: relative; overflow: hidden;\">\n      <div style=\"position: absolute; top: -30px; right: -8%; width: 300px; height: 300px; background: rgba(215,175,235,0.14); clip-path: url(#gc-droplet); z-index: 0;\"><\u002Fdiv>\n        <div style=\"display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 64px; align-items: center; position: relative; z-index: 1;\">\n          <div>\n            <div style=\"font-size: 14px; font-weight: 700; color: #6B0A9F; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 16px;\">01 · Context<\u002Fdiv>\n            <h2 style=\"font-size: 42px; line-height: 1.12; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 24px; color: #3A04A8;\">Most people wait until things feel unmanageable.<\u002Fh2>\n            <p style=\"font-size: 19px; line-height: 1.65; color: #291A5C; margin: 0 0 18px;\">Every day, people contact GamCare because gambling is affecting their life. It might be causing problems with money or relationships, or they are feeling stressed, overwhelmed or alone.<\u002Fp>\n            <p style=\"font-size: 19px; line-height: 1.65; color: #291A5C; margin: 0;\">That timing gap matters. The longer support is delayed, the more there is to repair — finances, relationships, and a person's sense of their own agency.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"position: relative; width: 100%; aspect-ratio: 0.95; clip-path: url(#gc-droplet);\">\n            <image-slot id=\"context-photo\" shape=\"rect\" placeholder=\"Drop photography — candid, in-the-moment, natural light\" style=\"width: 100%; height: 100%;\"><\u002Fimage-slot>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw); margin: 72px 0; padding: 96px 8vw; background: #291A5C; overflow: hidden; position: relative;\">\n        <div style=\"position: absolute; top: -20%; left: -10%; width: 60vw; height: 60vw; max-width: 700px; max-height: 700px; background: rgba(215,175,235,0.08); clip-path: url(#gc-droplet);\"><\u002Fdiv>\n        <div style=\"position: relative; max-width: 1000px; margin: 0 auto; text-align: center;\">\n          <div style=\"font-size: 100px; line-height: 1; font-weight: 800; color: #6B0A9F; margin-bottom: 8px;\">“<\u002Fdiv>\n          <div style=\"font-size: 48px; line-height: 1.25; font-weight: 700; color: #FFF8EF; letter-spacing: -0.015em; margin: 0 0 32px;\">People rarely make first contact at the point the harm began. By the time someone reaches us, the cost has often already been paid.<\u002Fdiv>\n          <div style=\"display: inline-flex; align-items: center; gap: 10px;\">\n            <span style=\"width: 10px; height: 10px; background: #D7AFEB; clip-path: url(#gc-droplet);\"><\u002Fspan>\n            <span style=\"font-size: 15px; font-weight: 600; color: #D7AFEB; text-transform: uppercase; letter-spacing: 0.04em;\">National Gambling Helpline adviser<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 80px;\">\n        <sc-for list=\"{{ heroStats }}\" as=\"stat\" hint-placeholder-count=\"3\">\n          <div style=\"background: #FFFFFF; border: 1px solid rgba(41,26,92,0.08); border-radius: 24px; padding: 32px 24px;\">\n            <div style=\"font-size: 32px; font-weight: 700; color: #6B0A9F; letter-spacing: -0.01em; margin-bottom: 8px;\">{{ stat.value }}<\u002Fdiv>\n            <div style=\"font-size: 15px; color: #291A5C; line-height: 1.4;\">{{ stat.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"data\" style=\"scroll-margin-top: 140px;\">\n      <div style=\"font-size: 14px; font-weight: 700; color: #6B0A9F; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 16px;\">02 · The data<\u002Fdiv>\n      <h2 style=\"font-size: 42px; line-height: 1.12; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 24px; color: #3A04A8; max-width: 780px;\">People come forward at crisis point, not before it.<\u002Fh2>\n      <p style=\"font-size: 19px; line-height: 1.65; color: #291A5C; margin: 0 0 48px; max-width: 720px;\">Contact patterns across our services point to a consistent story. The chart below illustrates the shape of that pattern across a typical reporting year.<\u002Fp>\n\n      <div style=\"margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw); padding: 80px 8vw; background: linear-gradient(60deg, #291A5C 0%, #3A04A8 100%); position: relative; overflow: hidden;\">\n        <div style=\"position: absolute; top: -15%; right: 4%; width: 44vw; height: 44vw; max-width: 520px; max-height: 520px; background: rgba(215,175,235,0.08); clip-path: url(#gc-droplet); pointer-events: none;\"><\u002Fdiv>\n        <div style=\"max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 340px 1fr; gap: 64px; align-items: center; position: relative;\">\n          <div style=\"text-align: center;\">\n            <div style=\"width: 220px; height: 220px; margin: 0 auto; clip-path: url(#gc-droplet); background: rgba(255,255,255,0.16); display: flex; align-items: center; justify-content: center;\">\n              <div style=\"font-size: 60px; font-weight: 800; color: #FFFFFF; letter-spacing: -0.02em; line-height: 1;\">{{ headlineStat.value }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size: 17px; color: #D7AFEB; line-height: 1.5; margin-top: 22px; max-width: 260px; margin-left: auto; margin-right: auto;\">{{ headlineStat.label }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-size: 14px; font-weight: 600; color: #D7AFEB; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 32px;\">Illustrative · helpline contacts by stage of harm<\u002Fdiv>\n            <div style=\"display: flex; align-items: flex-end; gap: 32px; height: 280px;\">\n              <sc-for list=\"{{ chartBars }}\" as=\"bar\" hint-placeholder-count=\"4\">\n                <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; gap: 16px; height: 100%; justify-content: flex-end;\">\n                  <div style=\"font-size: 20px; font-weight: 700; color: #FFFFFF;\">{{ bar.pct }}<\u002Fdiv>\n                  <div style=\"width: 100%; max-width: 96px; border-radius: 14px 14px 4px 4px; background: {{ bar.color }}; height: {{ bar.height }}; transform-origin: bottom; animation: growBar 0.9s ease-out;\"><\u002Fdiv>\n                  <div style=\"font-size: 15px; color: #D7AFEB; font-weight: 500; text-align: center;\">{{ bar.label }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"font-size: 13.5px; color: #D7AFEB; margin-top: 28px; opacity: 0.85;\">Source: placeholder — replace with current reporting figures before publishing.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 72px 0 48px;\">\n        <div style=\"position: relative; width: 100%; aspect-ratio: 1.3; border-radius: 28px; overflow: hidden;\">\n          <image-slot id=\"data-photo-1\" shape=\"rect\" placeholder=\"Drop supporting photography\" style=\"width: 100%; height: 100%;\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"position: relative; width: 100%; aspect-ratio: 1.3; border-radius: 28px; overflow: hidden;\">\n          <image-slot id=\"data-photo-2\" shape=\"rect\" placeholder=\"Drop supporting photography\" style=\"width: 100%; height: 100%;\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background: #FFFFFF; border: 1px solid rgba(41,26,92,0.08); border-radius: 24px; padding: 40px; margin-bottom: 80px;\">\n        <div style=\"font-size: 13.5px; font-weight: 700; color: #6B0A9F; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 20px;\">Key takeaways<\u002Fdiv>\n        <sc-for list=\"{{ takeaways }}\" as=\"item\" hint-placeholder-count=\"4\">\n          <div style=\"display: flex; gap: 16px; align-items: flex-start; margin-bottom: 18px;\">\n            <span style=\"flex-shrink: 0; width: 24px; height: 24px; margin-top: 2px; background: #6B0A9F; clip-path: url(#gc-droplet);\"><\u002Fspan>\n            <div style=\"font-size: 18px; line-height: 1.55; color: #291A5C;\">{{ item }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"gaps\" style=\"scroll-margin-top: 140px;\">\n      <div style=\"font-size: 14px; font-weight: 700; color: #6B0A9F; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 16px;\">03 · The gaps<\u002Fdiv>\n      <h2 style=\"font-size: 42px; line-height: 1.12; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 24px; color: #3A04A8; max-width: 780px;\">Support built for one person can leave others out.<\u002Fh2>\n      <p style=\"font-size: 19px; line-height: 1.65; color: #291A5C; margin: 0 0 48px; max-width: 720px;\">Someone else's gambling can affect a partner, a parent or a friend just as significantly — and their access to timely support matters as much.<\u002Fp>\n\n      <div style=\"margin-left: calc(50% - 50vw); margin-right: calc(50% - 50vw); margin-bottom: 56px; padding: 96px 8vw; background: linear-gradient(60deg, #3A04A8 0%, #6B0A9F 100%); overflow: hidden; position: relative;\">\n        <div style=\"position: absolute; bottom: -25%; left: -8%; width: 56vw; height: 56vw; max-width: 640px; max-height: 640px; background: rgba(255,255,255,0.08); clip-path: url(#gc-droplet);\"><\u002Fdiv>\n        <div style=\"position: relative; max-width: 1000px; margin: 0 auto; text-align: center;\">\n          <div style=\"font-size: 100px; line-height: 1; font-weight: 800; color: #D7AFEB; margin-bottom: 8px;\">“<\u002Fdiv>\n          <div style=\"font-size: 48px; line-height: 1.25; font-weight: 700; color: #FFF8EF; letter-spacing: -0.015em; margin: 0 0 32px;\">Nobody asked how I was doing. All the support seemed aimed at him. It took a long time before I realised there was somewhere for me too.<\u002Fdiv>\n          <div style=\"display: inline-flex; align-items: center; gap: 10px;\">\n            <span style=\"width: 10px; height: 10px; background: #FFFFFF; clip-path: url(#gc-droplet);\"><\u002Fspan>\n            <span style=\"font-size: 15px; font-weight: 600; color: #FFFFFF; text-transform: uppercase; letter-spacing: 0.04em;\">Family member, affected by someone else's gambling<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"font-size: 19px; line-height: 1.65; color: #291A5C; margin: 0 0 80px; max-width: 720px;\">Early, low-threshold routes into support — in primary care, in workplaces, in community settings — remain inconsistent across Great Britain. Where they exist, they change how early people come forward.<\u002Fp>\n    <\u002Fdiv>\n\n    <div id=\"practice\" style=\"scroll-margin-top: 140px;\">\n      <div style=\"position: relative; overflow: hidden;\">\n        <div style=\"position: absolute; top: -20px; left: -10%; width: 280px; height: 280px; background: rgba(215,175,235,0.14); clip-path: url(#gc-droplet); z-index: 0;\"><\u002Fdiv>\n        <div style=\"position: relative; z-index: 1;\">\n          <div style=\"font-size: 14px; font-weight: 700; color: #6B0A9F; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 16px;\">04 · Good practice<\u002Fdiv>\n          <h2 style=\"font-size: 42px; line-height: 1.12; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 24px; color: #3A04A8; max-width: 780px;\">Early routes change how people describe the experience.<\u002Fh2>\n          <p style=\"font-size: 19px; line-height: 1.65; color: #291A5C; margin: 0 0 48px; max-width: 720px;\">Where early routes into support exist, the difference is measurable in how people describe their experience, not only in outcomes further down the line.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; margin-bottom: 56px;\">\n        <div style=\"position: relative; width: 100%; aspect-ratio: 1; clip-path: url(#gc-droplet);\">\n          <image-slot id=\"practice-photo\" shape=\"rect\" placeholder=\"Drop photography — good practice in action\" style=\"width: 100%; height: 100%;\"><\u002Fimage-slot>\n        <\u002Fdiv>\n        <div style=\"border-radius: 24px; overflow: hidden; border: 1px solid rgba(41,26,92,0.1);\">\n          <div style=\"display: grid; grid-template-columns: 1.4fr 1fr 1fr;\">\n            <div style=\"padding: 18px 22px; font-size: 13.5px; font-weight: 700; color: #FFF8EF; background: #3A04A8; text-transform: uppercase; letter-spacing: 0.03em;\">Approach<\u002Fdiv>\n            <div style=\"padding: 18px 22px; font-size: 13.5px; font-weight: 700; color: #FFF8EF; background: #3A04A8; text-transform: uppercase; letter-spacing: 0.03em;\">Contact point<\u002Fdiv>\n            <div style=\"padding: 18px 22px; font-size: 13.5px; font-weight: 700; color: #FFF8EF; background: #3A04A8; text-transform: uppercase; letter-spacing: 0.03em;\">Typical outcome<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ comparisonRows }}\" as=\"row\" hint-placeholder-count=\"3\">\n            <div style=\"display: grid; grid-template-columns: 1.4fr 1fr 1fr; border-top: 1px solid rgba(41,26,92,0.08);\">\n              <div style=\"padding: 18px 22px; font-size: 15.5px; color: #291A5C; font-weight: 600; background: #FFFFFF;\">{{ row.approach }}<\u002Fdiv>\n              <div style=\"padding: 18px 22px; font-size: 15.5px; color: #291A5C; background: #FFFFFF;\">{{ row.contact }}<\u002Fdiv>\n              <div style=\"padding: 18px 22px; font-size: 15.5px; color: #291A5C; background: #FFFFFF;\">{{ row.outcome }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"recs\" style=\"scroll-margin-top: 140px;\">\n      <div style=\"font-size: 14px; font-weight: 700; color: #6B0A9F; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 16px;\">05 · Recommendations<\u002Fdiv>\n      <h2 style=\"font-size: 42px; line-height: 1.12; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 40px; color: #3A04A8; max-width: 780px;\">Three shifts that would bring support forward.<\u002Fh2>\n\n      <div style=\"position: relative; overflow: hidden;\">\n        <div style=\"position: absolute; top: 10%; right: -6%; width: 300px; height: 300px; background: rgba(215,175,235,0.12); clip-path: url(#gc-droplet); z-index: 0;\"><\u002Fdiv>\n        <div style=\"position: relative; z-index: 1; display: flex; flex-direction: column; gap: 4px;\">\n          <sc-for list=\"{{ recommendations }}\" as=\"rec\" hint-placeholder-count=\"3\">\n            <div style=\"display: flex; gap: 28px; padding: 36px 0; border-top: 1px solid rgba(41,26,92,0.1);\">\n              <div style=\"flex-shrink: 0; width: 64px; height: 64px; background: #D7AFEB; clip-path: url(#gc-droplet); display: flex; align-items: center; justify-content: center; font-weight: 700; color: #3A04A8; font-size: 24px;\">{{ rec.n }}<\u002Fdiv>\n              <div>\n                <div style=\"font-size: 24px; font-weight: 700; color: #291A5C; margin-bottom: 10px;\">{{ rec.title }}<\u002Fdiv>\n                <div style=\"font-size: 17.5px; line-height: 1.6; color: #291A5C; max-width: 640px;\">{{ rec.body }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div id=\"conclusion\" style=\"scroll-margin-top: 140px;\">\n      <div style=\"font-size: 14px; font-weight: 700; color: #6B0A9F; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 16px;\">06 · Conclusion<\u002Fdiv>\n      <h2 style=\"font-size: 42px; line-height: 1.12; font-weight: 700; letter-spacing: -0.01em; margin: 0 0 24px; color: #3A04A8; max-width: 780px;\">Timing shapes what recovery looks like for everyone involved.<\u002Fh2>\n      <p style=\"font-size: 19px; line-height: 1.65; color: #291A5C; margin: 0 0 18px; max-width: 720px;\">Wherever someone is on their journey, timing shapes how much support can help. Policy that brings the first point of contact forward — before crisis, not just after it — changes outcomes for everyone involved.<\u002Fp>\n      <p style=\"font-size: 19px; line-height: 1.65; color: #291A5C; margin: 0 0 56px; max-width: 720px;\">We are here to work alongside policymakers on what that looks like in practice.<\u002Fp>\n\n      <div style=\"border-top: 1px solid rgba(41,26,92,0.12); padding: 28px 0 0; margin-bottom: 40px;\">\n        <button onclick=\"{{ toggleMethodology }}\" style=\"display: flex; align-items: center; justify-content: space-between; width: 100%; background: none; border: none; padding: 0; cursor: pointer; font-family: inherit;\">\n          <span style=\"font-size: 16px; font-weight: 600; color: #6B0A9F;\">Methodology &amp; sources<\u002Fspan>\n          <span style=\"font-size: 22px; color: #6B0A9F; transform: rotate({{ methodologyRotation }}); transition: transform 0.2s;\">+<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ methodologyOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding-top: 18px; font-size: 16px; line-height: 1.6; color: #291A5C;\">\n            <p style=\"margin: 0;\">Figures referenced in this briefing are illustrative placeholders for template purposes. Replace with sourced reporting data, citations and publication dates before this edition goes live.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display: flex; align-items: center; gap: 20px; padding: 36px; background: #FFFFFF; border: 1px solid rgba(41,26,92,0.08); border-radius: 24px; margin-bottom: 80px; max-width: 760px;\">\n        <img src=\"6f515219-b201-4c30-9af7-7271576e32c6\" alt=\"GamCare\" style=\"width: 64px; height: 64px; flex-shrink: 0;\">\n        <div>\n          <div style=\"font-size: 17px; font-weight: 700; color: #291A5C; margin-bottom: 4px;\">GamCare Policy &amp; Public Affairs team<\u002Fdiv>\n          <div style=\"font-size: 15px; line-height: 1.5; color: #6B0A9F;\">We work with parliamentarians, regulators and sector partners to bring lived and learned experience of gambling harms into policy.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <section style=\"max-width: 1400px; margin: 0 auto; padding: 0 32px 80px;\">\n    <div style=\"display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap;\">\n      <h3 style=\"font-size: 30px; font-weight: 700; color: #3A04A8; margin: 0; letter-spacing: -0.01em;\">Related editions<\u002Fh3>\n      <div style=\"display: flex; gap: 10px;\">\n        <button onclick=\"{{ scrollCarouselLeft }}\" style=\"width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(41,26,92,0.15); background: #FFFFFF; cursor: pointer; font-size: 16px; color: #3A04A8;\">←<\u002Fbutton>\n        <button onclick=\"{{ scrollCarouselRight }}\" style=\"width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(41,26,92,0.15); background: #FFFFFF; cursor: pointer; font-size: 16px; color: #3A04A8;\">→<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div ref=\"{{ setCarouselRef }}\" style=\"display: flex; gap: 24px; overflow-x: auto; scroll-behavior: smooth; padding-bottom: 8px;\">\n      <sc-for list=\"{{ relatedEditions }}\" as=\"ed\" hint-placeholder-count=\"3\">\n        <a href=\"#\" style=\"flex-shrink: 0; width: 340px; display: block; background: #FFFFFF; border: 1px solid rgba(41,26,92,0.08); border-radius: 22px; overflow: hidden; text-decoration: none;\">\n          <div style=\"height: 190px; background: {{ ed.bg }};\"><\u002Fdiv>\n          <div style=\"padding: 22px 24px;\">\n            <div style=\"font-size: 12.5px; font-weight: 700; color: #6B0A9F; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 10px;\">{{ ed.tag }}<\u002Fdiv>\n            <div style=\"font-size: 18px; font-weight: 600; color: #291A5C; line-height: 1.35;\">{{ ed.title }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"helpline\" style=\"position: relative; background: #3A04A8; padding: 100px 32px; text-align: center; overflow: hidden;\">\n    <div style=\"position: absolute; top: -30%; left: 50%; margin-left: -450px; width: 900px; height: 900px; background: rgba(215,175,235,0.06); clip-path: url(#gc-droplet);\"><\u002Fdiv>\n    <div style=\"position: relative; max-width: 680px; margin: 0 auto;\">\n      <div style=\"width: 40px; height: 40px; background: #D7AFEB; clip-path: url(#gc-droplet); margin: 0 auto 28px;\"><\u002Fdiv>\n      <h3 style=\"font-size: 40px; font-weight: 700; color: #FFF8EF; letter-spacing: -0.01em; margin: 0 0 18px;\">When you're ready to talk, we're here to listen.<\u002Fh3>\n      <p style=\"font-size: 18px; line-height: 1.6; color: #D7AFEB; margin: 0 0 36px;\">Free, confidential support is available around the clock through the National Gambling Helpline, Live Chat and WhatsApp.<\u002Fp>\n      <a href=\"#\" style=\"display: inline-flex; align-items: center; gap: 10px; background: #FFF8EF; color: #3A04A8; font-weight: 600; font-size: 16px; padding: 18px 34px; border-radius: 100px;\">Contact the National Gambling Helpline<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"max-width: 1400px; margin: 0 auto; padding: 40px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;\">\n    <div style=\"display: flex; align-items: center; gap: 10px;\">\n      <div style=\"width: 16px; height: 16px; background: #6B0A9F; clip-path: url(#gc-droplet);\"><\u002Fdiv>\n      <span style=\"font-size: 14px; color: #6B0A9F;\">GamCare Editorial · Issue 04<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display: flex; gap: 24px; font-size: 14px;\">\n      <a href=\"#\" style=\"color: #6B0A9F;\">All editions<\u002Fa>\n      <a href=\"#\" style=\"color: #6B0A9F;\">Privacy<\u002Fa>\n      <a href=\"#\" style=\"color: #6B0A9F;\">Contact<\u002Fa>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 1000}}\">\nclass Component extends DCLogic {\n  sectionIds = ['ctx', 'data', 'gaps', 'practice', 'recs', 'conclusion'];\n  state = { scrollPct: 0, activeSection: 'ctx', methodologyOpen: false };\n\n  root = null;\n  carousel = null;\n\n  setRootRef = (el) => { this.root = el; };\n  setCarouselRef = (el) => { this.carousel = el; };\n\n  componentDidMount() {\n    this.onScroll = () => {\n      const doc = document.documentElement;\n      const total = doc.scrollHeight - doc.clientHeight;\n      const pct = total > 0 ? Math.min(100, Math.max(0, (window.scrollY / total) * 100)) : 0;\n      this.setState({ scrollPct: pct });\n    };\n    window.addEventListener('scroll', this.onScroll, { passive: true });\n\n    this.observer = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (entry.isIntersecting) this.setState({ activeSection: entry.target.id });\n      });\n    }, { rootMargin: '-150px 0px -60% 0px' });\n    this.sectionIds.forEach((id) => {\n      const el = document.getElementById(id);\n      if (el) this.observer.observe(el);\n    });\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.onScroll);\n    if (this.observer) this.observer.disconnect();\n  }\n\n  toggleMethodology = () => this.setState(s => ({ methodologyOpen: !s.methodologyOpen }));\n  scrollCarouselLeft = () => { if (this.carousel) this.carousel.scrollBy({ left: -360, behavior: 'smooth' }); };\n  scrollCarouselRight = () => { if (this.carousel) this.carousel.scrollBy({ left: 360, behavior: 'smooth' }); };\n\n  renderVals() {\n    const labels = ['Context', 'The data', 'The gaps', 'Good practice', 'Recommendations', 'Conclusion'];\n    const active = this.state.activeSection;\n    return {\n      progressPct: this.state.scrollPct + '%',\n      tabs: labels.map((label, i) => {\n        const id = this.sectionIds[i];\n        const isActive = id === active;\n        return {\n          n: String(i + 1).padStart(2, '0'),\n          label,\n          href: '#' + id,\n          bg: isActive ? '#FFF8EF' : 'rgba(41,26,92,0.45)',\n          color: isActive ? '#3A04A8' : '#FFF8EF',\n          border: isActive ? 'none' : '1px solid #D7AFEB',\n          navBg: isActive ? '#3A04A8' : 'rgba(41,26,92,0.06)',\n          navColor: isActive ? '#FFF8EF' : '#291A5C',\n          navBorder: isActive ? 'none' : '1px solid rgba(41,26,92,0.12)',\n        };\n      }),\n      methodologyOpen: this.state.methodologyOpen,\n      methodologyRotation: this.state.methodologyOpen ? '45deg' : '0deg',\n      takeaways: [\n        'Most first contacts happen after harm has already built up, not at the first sign of difficulty.',\n        'Support for people affected by someone else\\u2019s gambling is often harder to find than support for the person gambling.',\n        'Low-threshold routes into help, in primary care and community settings, change how early people come forward.',\n        'Bringing the first point of contact forward is a policy choice, not an inevitability.',\n      ],\n      heroStats: [\n        { value: '24/7', label: 'Support available every hour, every day' },\n        { value: 'Free', label: 'Every conversation, with no cost to call' },\n        { value: 'Confidential', label: 'A private space to talk things through' },\n      ],\n      headlineStat: { value: '70%', label: 'of first-time contacts describe reaching out only once things felt unmanageable' },\n      chartBars: [\n        { label: 'Early signs', height: '28%', pct: '18%', color: '#D7AFEB' },\n        { label: 'Building strain', height: '52%', pct: '34%', color: '#6B0A9F' },\n        { label: 'Crisis point', height: '100%', pct: '70%', color: '#FFFFFF' },\n        { label: 'After crisis', height: '64%', pct: '41%', color: '#6B0A9F' },\n      ],\n      comparisonRows: [\n        { approach: 'Crisis-led signposting', contact: 'Point of financial or legal crisis', outcome: 'Longer recovery, higher personal cost' },\n        { approach: 'Community & primary care routes', contact: 'Early conversation, low threshold', outcome: 'Earlier support, smaller impact' },\n        { approach: 'Workplace & third-sector referral', contact: 'Before harm escalates', outcome: 'Sustained engagement with support' },\n      ],\n      recommendations: [\n        { n: '1', title: 'Fund early-intervention routes, not only crisis response', body: 'Commission low-threshold support in primary care and community settings, where first conversations are most likely to happen.' },\n        { n: '2', title: 'Recognise affected others in funding and services', body: 'Ensure family members and partners have a clear, separate route into support, not one framed only around the person who gambles.' },\n        { n: '3', title: 'Standardise early-warning referral pathways', body: 'Build consistent, national referral routes so that where someone lives does not determine how early they can get help.' },\n      ],\n      relatedEditions: [\n        { tag: 'Issue 03 \\u00b7 Summer 2026', title: 'Understanding the affordability of harm across income groups', bg: '#D7AFEB' },\n        { tag: 'Issue 02 \\u00b7 Spring 2026', title: 'What frontline advisers are seeing in first-contact calls', bg: '#6B0A9F' },\n        { tag: 'Issue 01 \\u00b7 Winter 2025', title: 'A decade of the National Gambling Helpline, in context', bg: '#291A5C' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
